groups:
  - name: nwr_alerts
    interval: 1m
    rules:
      - alert: LLMHighErrorRate
        expr: |
          rate(nwr_llm_calls_total{status="error"}[5m])
          /
          rate(nwr_llm_calls_total[5m])
          > 0.10
        for: 2m
        labels:
          severity: warning
          team: nwr
        annotations:
          summary: "LLM error rate > 10% ({{ $value | humanizePercentage }})"
          description: "Agent {{ $labels.agent }} has {{ $value | humanizePercentage }} error rate over 5min."

      - alert: LLMHighLatency
        expr: |
          histogram_quantile(0.95, rate(nwr_llm_latency_seconds_bucket[5m]))
          > 60
        for: 2m
        labels:
          severity: warning
          team: nwr
        annotations:
          summary: "LLM p95 latency > 60s"
          description: "Agent {{ $labels.agent }} p95 latency is {{ $value | humanizeDuration }}."

      - alert: TaskBacklog
        expr: |
          nwr_task_duration_seconds_count
          - nwr_task_duration_seconds_count offset 10m
          > 10
        for: 1m
        labels:
          severity: info
          team: nwr
        annotations:
          summary: "Task backlog growing"
          description: "More than 10 tasks started in the last 10 minutes."

      - alert: NoLLMThroughput
        expr: |
          rate(nwr_llm_calls_total[5m]) == 0
        for: 5m
        labels:
          severity: info
          team: nwr
        annotations:
          summary: "No LLM calls in 5 minutes"
          description: "The system may be idle or the LLM provider may be down."
